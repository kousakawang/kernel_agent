task_id: "unknown_task"
task_group_id: "unknown_group"
task_type: "core_kernel_optimization"
owner: "framework_engineer"
target_model: "unknown"
target_framework: "unknown"
target_hardware: "unknown"

objective: |
  Optimize the captured framework target interface under the provided
  snapshot replay ABI. Kernel Engineer must not change golden semantics,
  snapshots, snapshot_runtime.py, or benchmark measurement logic.

source_entrypoints:
  configured_target_file: ""
  configured_target_line: null
  target_file: ""
  target_line: null
  target_resolution: "unknown"
  kernel_source_package: ""
  forward_boundary_file: ""
  forward_boundary_line: null

kernel_abi:
  candidate_function: "candidate"
  signature: |
    candidate(*args, **kwargs)
  required_semantics: |
    Match captured snapshot-golden behavior on all required selected samples
    in task/snapshots/manifest.json.
  forbidden_changes:
    - "Do not change task/snapshots/"
    - "Do not change task/snapshot_runtime.py"
    - "Do not change task/shape_list.json except via Framework Engineer snapshot selection"
    - "Do not change task/original_impl.py"
    - "Do not change task/reference_impl.py"
    - "Do not relax tolerance in task/correctness_test.py"
    - "Do not change task/benchmark.py timing/reset rules"

inputs_are_framework_owned: true
input_construction_policy: |
  Framework Engineer owns input construction. Kernel Engineer may inspect
  selected snapshots, but must not replace them with unrelated random inputs.
  Selected snapshots are the replay source; shape_list.json is only a summary.

commands:
  correctness: "python task/scripts/run_correctness.py"
  benchmark: "python task/scripts/run_benchmark.py"
  profile: "python task/scripts/run_ncu.py <group_id> [sample_id]"

kernel_translate_scope:
  writable_paths:
    - "task/kernel_translate/"
  read_only_paths:
    - "task/candidate_impl.py"
    - "task/kernel_source_package/"
    - "task/snapshots/"
    - "task/correctness_test.py"
    - "task/benchmark.py"
    - "task/task.yaml"

kernel_engineer_scope:
  writable_paths:
    - "task/candidate_impl.py"
    - "task/kernel_engineer_ws/"
  read_only_paths:
    - "task/kernel_translate/"
    - "task/kernel_source_package/"
    - "task/snapshots/"
    - "task/snapshot_runtime.py"
    - "task/original_impl.py"
    - "task/reference_impl.py"
    - "task/correctness_test.py"
    - "task/benchmark.py"
    - "task/scripts/"
    - "task/env_probe/"
    - "task/docs/"
    - "task/task.yaml"
    - "README.md"
    - "validate_task_pack.py"
