schema_version: kid-runtime-config/v2
backend_name: triton
workdir: /workspace
output_dir: /workspace/kid/cli_log/triton

target:
  file: /workspace/sglang/python/sglang/srt/model_executor/model_runner.py
  line: 500
  qualified_name: ModelRunner.forward

cmd: "python -m sglang.launch_server --model-path /models/example"
test_cmd: "python test_request.py"
ready:
  type: http
  url: http://127.0.0.1:30000/health
  timeout_sec: 300
stop:
  signal: SIGINT
  grace_sec: 30
env:

selection:
  skip_invocations: 0
  stages: [prefill, decode, unknown]
  sample_count_per_stage: 1
  sampling: last_n
  aggregation: single

profiling:
  nsys_bin: nsys
  max_runtime_sec: 1800
  disable_cuda_graph: true
  min_capture_coverage: 1.0
