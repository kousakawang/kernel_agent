profiling:
  nsys_bin: nsys
  trace_cuda_graph_nodes: true
  include_python_backtrace: true
  skip_target_invocations: 0
  max_runtime_sec: 1800

resolution:
  source_roots:
    - ./sglang/python
    - ./sglang/sgl-kernel
  third_party_prefixes:
    - flashinfer
    - flash_attn
    - deep_gemm
    - aiter
    - kt_kernel

